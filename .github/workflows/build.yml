name: Build Windows Executable

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pillow
          pip install -r requirements.txt

      - name: Convert image to ICO
        run: |
          python -c "
          from PIL import Image
          import os

          img = Image.open('frontend/app-icon.jpg')
          # Convert to RGBA if needed
          if img.mode != 'RGBA':
              img = img.convert('RGBA')

          # Resize to 256x256 for ICO
          sizes = [(16,16), (32,32), (48,48), (64,64), (128,128), (256,256)]
          img.save('app.ico', format='ICO', sizes=sizes)
          print('Icon created: app.ico')
          "

      - name: Build with PyInstaller
        run: |
          pyinstaller --name "CloudDiskShareManagement" `
            --onedir `
            --windowed `
            --icon=app.ico `
            --add-data "frontend;frontend" `
            --add-data "data;data" `
            --add-data "backend;backend" `
            --hidden-import flask `
            --hidden-import flask_cors `
            --hidden-import chardet `
            --hidden-import sqlite3 `
            --hidden-import certifi `
            --hidden-import charset_normalizer `
            --hidden-import idna `
            --hidden-import urllib3 `
            --hidden-import requests `
            --collect-all flask `
            --collect-all werkzeug `
            --collect-all jinja2 `
            --collect-all markupsafe `
            --collect-all certifi `
            --collect-all charset_normalizer `
            --collect-all idna `
            --collect-all urllib3 `
            --collect-all requests `
            --runtime-tmpdir "." `
            main.py

      - name: Create data directory
        run: |
          if not exist "dist\CloudDiskShareManagement\data" mkdir "dist\CloudDiskShareManagement\data"

      - name: Copy additional files
        run: |
          copy requirements.txt "dist\CloudDiskShareManagement\"
          (
            echo CloudDiskShareManagement
            echo ====================
            echo.
            echo Usage:
            echo   Double-click CloudDiskShareManagement.exe to start
            echo.
            echo This application requires no additional dependencies.
            echo.
            echo Built with GitHub Actions
          ) > "dist\CloudDiskShareManagement\README.txt"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloudDiskShareManagement-Windows
          path: dist/CloudDiskShareManagement/
          retention-days: 30

      - name: Create ZIP package
        run: |
          powershell -Command "Compress-Archive -Path 'dist\CloudDiskShareManagement\*' -DestinationPath 'dist\CloudDiskShareManagement.zip' -Force"

      - name: Upload ZIP package
        uses: actions/upload-artifact@v4
        with:
          name: CloudDiskShareManagement-Windows-Zip
          path: dist/CloudDiskShareManagement.zip
          retention-days: 30

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: CloudDiskShareManagement-Windows

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: CloudDiskShareManagement-Windows.zip
          body: |
            ## CloudDiskShareManagement

            Windows portable executable (no installation required).

            ### Usage
            1. Extract the ZIP file
            2. Run `CloudDiskShareManagement.exe`

            ### Requirements
            - Windows 10 or later
            - No additional dependencies needed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
