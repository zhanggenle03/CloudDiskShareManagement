name: Build Windows Executable

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Convert image to ICO
        run: |
          python -c "
          from PIL import Image
          img = Image.open('frontend/app-icon.jpg')
          if img.mode != 'RGBA':
              img = img.convert('RGBA')
          sizes = [(16,16), (32,32), (48,48), (64,64), (128,128), (256,256)]
          img.save('app.ico', format='ICO', sizes=sizes)
          print('Icon created: app.ico')
          "

      - name: Build with PyInstaller
        run: |
          pyinstaller CloudDiskShareManagement.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloudDiskShareManagement-Windows
          path: dist/CloudDiskShareManagement/
          retention-days: 30

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: CloudDiskShareManagement-Windows
          path: CloudDiskShareManagement

      - name: Create ZIP for Release
        run: |
          zip -r CloudDiskShareManagement.zip CloudDiskShareManagement/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: CloudDiskShareManagement.zip
          body: |
            ## CloudDiskShareManagement

            Windows portable executable (no installation required).

            ### Usage
            1. Download and extract the ZIP file
            2. Run `CloudDiskShareManagement.exe`

            ### Requirements
            - Windows 10 or later
            - No additional dependencies needed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
