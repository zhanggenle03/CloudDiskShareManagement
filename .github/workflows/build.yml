name: Build Windows Executable

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pillow
          pip install -r requirements.txt

      - name: Convert image to ICO
        run: |
          python -c "
          from PIL import Image
          import os

          img = Image.open('frontend/app-icon.jpg')
          if img.mode != 'RGBA':
              img = img.convert('RGBA')
          sizes = [(16,16), (32,32), (48,48), (64,64), (128,128), (256,256)]
          img.save('app.ico', format='ICO', sizes=sizes)
          print('Icon created: app.ico')
          "

      - name: Create data directory
        run: |
          if (!(Test-Path "data\logs")) { New-Item -ItemType Directory -Path "data\logs" -Force }

      - name: Build with PyInstaller
        run: |
          pyinstaller CloudDiskShareManagement.spec --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloudDiskShareManagement-Windows
          path: dist/CloudDiskShareManagement/
          retention-days: 30

      - name: Create ZIP package
        run: |
          powershell -Command "Compress-Archive -Path 'dist\CloudDiskShareManagement\*' -DestinationPath 'dist\CloudDiskShareManagement.zip' -Force"

      - name: Upload ZIP package
        uses: actions/upload-artifact@v4
        with:
          name: CloudDiskShareManagement-Windows-Zip
          path: dist/CloudDiskShareManagement.zip
          retention-days: 30

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: CloudDiskShareManagement-Windows

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: CloudDiskShareManagement-Windows.zip
          body: |
            ## CloudDiskShareManagement

            Windows portable executable (no installation required).

            ### Usage
            1. Extract the ZIP file
            2. Run `CloudDiskShareManagement.exe`

            ### Requirements
            - Windows 10 or later
            - No additional dependencies needed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
